# Site Identity
title: Gitslate
author: Your Name
description: A clean, slate-like reading experience.

# Defaults
defaults:
  - scope:
      path: "" # applies to all files in the repo
    values:
      layout: "default" # default layout selected

# UI Labels (Configurable without touching HTML)
ui:
  theme_button: "Switch Mode"
  default_section_label: "Links"
  menu_header: "Gitslate"
  prev_label: "Previous"
  next_label: "Next"

# Jekyll Settings
remote_theme: jekyll/minima
data_source: .
