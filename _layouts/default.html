<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | {{ site.title }}</title>
    <style>
        :root {
            --bg-color: #fafafa;
            --sidebar-bg: #f3f4f6;
            --text-color: #111827;
            --accent-color: #2563eb;
            --border-color: #e5e7eb;
            --font-main: 'Inter', -apple-system, sans-serif;
            --font-read: 'Georgia', serif;
            --sidebar-width: 280px;
        }

        [data-theme="dark"] {
            --bg-color: #0f172a;
            --sidebar-bg: #1e293b;
            --text-color: #f1f5f9;
            --accent-color: #60a5fa;
            --border-color: #334155;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            transition: background 0.3s, color 0.3s;
            display: block;
        }

        /* --- MOBILE FIRST NAVIGATION --- */
        
        /* Mobile Overlay Background */
        .nav-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 90;
        }

        nav {
            position: fixed;
            top: 0;
            left: calc(-1 * var(--sidebar-width)); /* Hidden by default */
            width: var(--sidebar-width);
            height: 100vh;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            padding: 2rem 1.5rem;
            overflow-y: auto;
            z-index: 100;
            transition: left 0.3s ease;
        }

        /* State when menu is open on mobile */
        body.nav-open nav { left: 0; }
        body.nav-open .nav-overlay { display: block; }

        /* Mobile Header */
        header.mobile-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem;
            background: var(--sidebar-bg);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 80;
        }

        .burger-btn {
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 1.5rem;
            cursor: pointer;
        }

        /* --- DESKTOP ADAPTATION --- */
        @media (min-width: 1024px) {
            header.mobile-bar { display: none; }
            .nav-overlay { display: none !important; }
            
            nav {
                left: 0; /* Always visible */
            }

            main {
                margin-left: var(--sidebar-width);
                padding: 4rem;
            }
            
            .controls { top: 2rem; right: 4rem; }
        }

        /* --- CONTENT & UI --- */
        .menu-section { margin-bottom: 2rem; }
        .menu-label { 
            font-size: 0.75rem; 
            text-transform: uppercase; 
            letter-spacing: 0.1em; 
            opacity: 0.6; 
            margin-bottom: 0.5rem;
        }
        .menu-list { list-style: none; padding: 0; margin: 0; }
        .menu-list a { 
            text-decoration: none; 
            color: var(--text-color); 
            display: block; 
            padding: 0.5rem 0; 
        }

        main {
            padding: 2rem 1rem;
            max-width: 850px;
            margin: 0 auto;
        }

        article {
            font-family: var(--font-read);
            font-size: 1.15rem;
            line-height: 1.75;
        }

        .controls {
            position: fixed;
            top: 0.75rem;
            right: 1rem;
            z-index: 110;
        }
        #theme-btn {
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
        }
    </style>
</head>
<body id="body-tag">

    <!-- Mobile Top Bar -->
    <header class="mobile-bar">
        <button class="burger-btn" id="burger-open">☰</button>
        <span style="font-weight: bold;">{{ site.title }}</span>
        <div style="width: 1.5rem;"></div> <!-- spacer -->
    </header>

    <div class="nav-overlay" id="nav-overlay"></div>

    <div class="controls">
        <button id="theme-btn">{{ site.ui.theme_button | default: "Mode" }}</button>
    </div>

    <nav>
        <h2 style="font-size: 1.5rem; margin-bottom: 2rem; font-weight: 700;">
            {{ site.ui.menu_header | default: site.title }}
        </h2>
        
        {% for section in site.data.navigation.main_menu %}
        <div class="menu-section">
            <div class="menu-label">{{ section.title }}</div>
            <ul class="menu-list">
                {% for item in section.sub_items %}
                <li><a href="{{ item.url | relative_url }}">{{ item.title }}</a></li>
                {% endfor %}
            </ul>
        </div>
        {% endfor %}
    </nav>

    <main>
        <article>
            {{ content }}
        </article>
    </main>

    <script>
        const body = document.getElementById('body-tag');
        const themeBtn = document.getElementById('theme-btn');
        const burgerBtn = document.getElementById('burger-open');
        const overlay = document.getElementById('nav-overlay');

        /* Mobile Menu Logic */
        burgerBtn.addEventListener('click', () => body.classList.toggle('nav-open'));
        overlay.addEventListener('click', () => body.classList.remove('nav-open'));

        /* Cookie Theme Logic */
        function setCookie(cname, cvalue, exdays) {
            const d = new Date();
            d.setTime(d.getTime() + (exdays*24*60*60*1000));
            document.cookie = cname + "=" + cvalue + ";expires="+ d.toUTCString() + ";path=/";
        }

        function getCookie(cname) {
            let name = cname + "=";
            let ca = document.cookie.split(';');
            for(let i = 0; i < ca.length; i++) {
                let c = ca[i].trim();
                if (c.indexOf(name) == 0) return c.substring(name.length, c.length);
            }
            return "";
        }

        const currentTheme = getCookie("theme") || "light";
        body.setAttribute('data-theme', currentTheme);

        themeBtn.addEventListener('click', () => {
            const next = body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            body.setAttribute('data-theme', next);
            setCookie("theme", next, 365);
        });
    </script>
</body>
</html>
