<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>{{ page.title }} | {{ site.title }}</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --sidebar-bg: #1e293b;
            --text-color: #1e293b;
            --nav-text: #94a3b8;
            --nav-active: #ffffff;
            --accent-color: #3b82f6;
            --border-color: #e2e8f0;
            --btn-bg: #f8fafc;
            --sidebar-width: 280px;
            --border-thick: 2px;
        }

        [data-theme="dark"] {
            --bg-color: #0f172a;
            --sidebar-bg: #020617;
            --text-color: #f1f5f9;
            --border-color: #1e293b;
            --btn-bg: #1e293b;
        }

        /* --- BASE RESET --- */
        * { box-sizing: border-box; }

        body {
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            transition: background 0.2s;
            overflow-x: hidden; 
            width: 100%;
        }

        /* --- CODE & TEXT WRAPPING --- */
        pre, code {
            font-family: monospace;
            white-space: pre-wrap !important; 
            word-wrap: break-word !important;
        }

        /* --- MOBILE HEADER --- */
        .mobile-header {
            display: flex;
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 60px;
            background: var(--sidebar-bg);
            color: white;
            padding: 0 1rem;
            align-items: center;
            justify-content: space-between;
            z-index: 2000;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .burger-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0.5rem;
            display: flex;
            align-items: center;
        }

        /* --- SIDEBAR --- */
        nav {
            position: fixed;
            width: var(--sidebar-width);
            height: 100vh;
            background: var(--sidebar-bg);
            color: var(--nav-text);
            padding: 1.5rem;
            overflow-y: auto;
            z-index: 3000;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateX(-100%);
            border-right: 1px solid var(--border-color);
            -webkit-overflow-scrolling: touch; /* Smooth scroll for iOS */
        }

        .nav-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 2500;
            display: none;
            backdrop-filter: blur(2px);
        }

        body.nav-active nav { transform: translateX(0); }
        body.nav-active .nav-overlay { display: block; }

        @media (min-width: 1024px) {
            .mobile-header, .nav-overlay { display: none !important; }
            nav { transform: translateX(0); z-index: 1000; }
            main { margin-left: var(--sidebar-width); }
        }

        /* --- MENU REFINEMENT (MOBILE FOCUS) --- */
        .menu-brand { color: #ffffff; font-weight: 800; font-size: 1.1rem; margin-bottom: 2rem; display: block; }
        .menu-list { list-style: none; padding: 0; margin: 0 0 4rem 0; width: 100%; }
        
        .menu-link {
            text-decoration: none;
            color: inherit;
            display: block;
            padding: 0.6rem 0.8rem;
            border-radius: 4px;
            font-size: 0.95rem;
            margin-bottom: 2px;
            overflow-wrap: break-word; /* Protect long titles */
        }

        .dir-label { 
            font-size: 0.65rem; 
            text-transform: uppercase; 
            letter-spacing: 0.1em; 
            margin: 1.5rem 0 0.5rem 0.8rem; 
            color: #475569; 
            font-weight: bold; 
        }

        /* Mobile specific font/padding adjustments */
        @media (max-width: 600px) {
            nav { width: 85%; max-width: 300px; padding: 1rem; }
            .menu-link { font-size: 0.85rem; padding: 0.5rem 0.6rem; }
            .menu-brand { font-size: 1rem; margin-bottom: 1.5rem; }
        }

        .menu-link:hover { color: var(--nav-active); background: rgba(255,255,255,0.05); }
        .menu-link.active { color: var(--nav-active); background: var(--accent-color); font-weight: 600; }

        /* --- CONTENT --- */
        main {
            flex-grow: 1;
            padding: 80px 1.2rem 2rem 1.2rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        @media (min-width: 1024px) { main { padding: 4rem 2rem; } }

        article { width: 100%; max-width: 750px; flex-grow: 1; }
        .entry-title { font-size: 2.2rem; font-weight: 800; margin-bottom: 1.5rem; letter-spacing: -0.02em; line-height: 1.1; }

        @media (max-width: 600px) { .entry-title { font-size: 1.7rem; } }

        /* --- NAV BUTTONS --- */
        .page-navigation { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; margin: 4rem 0 3rem 0; width: 100%; }
        .nav-card {
            display: flex;
            align-items: center;
            padding: 1rem;
            border: var(--border-thick) solid var(--border-color);
            border-radius: 4px;
            text-decoration: none;
            color: var(--text-color);
            background: var(--btn-bg);
            font-weight: 600;
            font-size: 0.8rem;
            transition: all 0.2s ease;
        }
