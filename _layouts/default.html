<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>{{ page.title }} | {{ site.title }}</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --sidebar-bg: #1e293b;
            --text-color: #1e293b;
            --nav-text: #94a3b8;
            --nav-active: #ffffff;
            --accent-color: #3b82f6;
            --border-color: #e2e8f0;
            --btn-bg: #f8fafc;
            --sidebar-width: 280px;
            --border-thick: 2px;
        }

        [data-theme="dark"] {
            --bg-color: #0f172a;
            --sidebar-bg: #020617;
            --text-color: #f1f5f9;
            --border-color: #1e293b;
            --btn-bg: #1e293b;
        }

        /* --- RESET & BASE --- */
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; width: 100%; overflow-x: hidden; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            font-size: 1.1rem;
            line-height: 1.6;
            transition: background 0.2s;
        }

        @media (max-width: 1024px) {
            body { font-size: 1rem; }
        }

        /* --- MOBILE OVERFLOW PROTECTION --- */
        pre, code {
            font-family: 'JetBrains Mono', monospace;
            white-space: pre-wrap !important;
            word-wrap: break-word !important;
            overflow-wrap: break-word !important;
        }

        pre {
            background: rgba(0,0,0,0.03);
            padding: 1rem;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            margin: 1.5rem 0;
            max-width: 100%;
        }

        /* --- MOBILE HEADER (STAYS ON TOP) --- */
        .mobile-header {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 60px;
            background: var(--sidebar-bg);
            color: white;
            padding: 0 1.2rem;
            align-items: center;
            justify-content: space-between;
            z-index: 4000; /* Higher than everything else */
        }

        @media (max-width: 1024px) {
            .mobile-header { display: flex; }
        }

        .burger-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.6rem;
            cursor: pointer;
            padding: 5px;
        }

        /* --- SIDEBAR (FIXED POSITION) --- */
        nav {
            position: fixed;
            top: 0; left: 0;
            width: var(--sidebar-width);
            height: 100vh;
            background: var(--sidebar-bg);
            color: var(--nav-text);
            padding: 2rem 1.5rem;
            overflow-y: auto;
            z-index: 5000;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-right: 1px solid var(--border-color);
        }

        /* Mobile State: Hidden by default */
        @media (max-width: 1024px) {
            nav { transform: translateX(-100%); width: 85%; max-width: 320px; }
            body.nav-active nav { transform: translateX(0); }
        }

        .nav-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 4500;
            display: none;
            backdrop-filter: blur(3px);
        }

        body.nav-active .nav-overlay { display: block; }

        /* --- MENU STYLE --- */
        .menu-brand { color: #ffffff; font-weight: 800; font-size: 1.2rem; margin-bottom: 2.5rem; display: block; }
        .menu-list { list-style: none; padding: 0; margin: 0 0 5rem 0; }
        
        .menu-link {
            text-decoration: none;
            color: inherit;
            display: block;
            padding: 0.6rem 0.8rem;
            border-radius: 4px;
            font-size: 0.95rem;
            margin-bottom: 3px;
            word-wrap: break-word;
        }

        .menu-link:hover { color: var(--nav-active); background: rgba(255,255,255,0.05); }
        .menu-link.active { color: var(--nav-active); background: var(--accent-color); font-weight: 600; }

        .dir-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin: 1.8rem 0 0.6rem 0.8rem;
            color: #475569;
            font-weight: bold;
        }

        /* --- THEME TOGGLE (SILHOUETTE BULB) --- */
        .theme-toggle-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.4rem;
            filter: grayscale(1) brightness(3) contrast(5);
            padding: 0;
            display: flex;
            align-items: center;
        }
